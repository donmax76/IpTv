name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix line endings
      run: sed -i 's/\r$//' gradlew

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace > build_output.log 2>&1 || {
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -150 build_output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build_output.log
          exit 1
        }
        echo "Build succeeded!"
        cat build_output.log

    - name: Find APK
      if: success()
      run: |
        echo "=== All APK files ==="
        find . -name "*.apk" -type f -ls
        APK_PATH=$(find . -name "*.apk" -path "*/outputs/apk/*" -type f | head -1)
        if [ -n "$APK_PATH" ]; then
          mkdir -p apk_output
          cp "$APK_PATH" apk_output/
          echo "APK found: $APK_PATH"
        fi

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: apk_output/*.apk
        if-no-files-found: warn

    - name: Create Release
      if: success() && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: TVViewer v5.1 (Build ${{ github.run_number }})
        files: apk_output/*.apk
        fail_on_unmatched_files: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
