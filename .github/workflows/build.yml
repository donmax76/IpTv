name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix line endings
      run: sed -i 's/\r$//' gradlew

    - name: Build Debug APK
      run: |
        set -o pipefail
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log

    - name: Find APK files
      if: success()
      run: |
        echo "=== All APK files ==="
        find . -name "*.apk" -type f -ls
        echo "=== Expected path ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "DEBUG APK DIR NOT FOUND"
        echo "=== Searching broader ==="
        find . -path "*/build/outputs/apk/**/*.apk" -type f -ls

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/**/*.apk
        if-no-files-found: warn

    - name: Create Release
      if: success() && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: TVViewer v5.1 (Build ${{ github.run_number }})
        files: |
          app/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/**/*.apk
        fail_on_unmatched_files: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_output.log
        if-no-files-found: ignore
