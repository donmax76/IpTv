name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix line endings
      run: sed -i 's/\r$//' gradlew

    - name: Build Debug APK
      id: build
      run: |
        set -o pipefail
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log
        BUILD_EXIT=$?
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build_output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Error lines:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -i "error" build_output.log | head -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
      continue-on-error: true

    - name: Print errors if build failed
      if: steps.build.outcome == 'failure'
      run: |
        echo "::error::Build failed. See summary for details."
        echo "=== LAST 80 LINES OF BUILD OUTPUT ==="
        tail -80 build_output.log
        echo "=== ERROR LINES ==="
        grep -in "error" build_output.log | head -30
        exit 1

    - name: Find and upload APK
      if: steps.build.outcome == 'success'
      run: |
        echo "=== All APK files ==="
        find . -name "*.apk" -type f -ls
        APK_PATH=$(find . -name "*.apk" -path "*/outputs/apk/*" -type f | head -1)
        if [ -n "$APK_PATH" ]; then
          mkdir -p apk_output
          cp "$APK_PATH" apk_output/
          echo "APK found: $APK_PATH"
          echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "APK: $(basename $APK_PATH)" >> $GITHUB_STEP_SUMMARY
        else
          echo "::warning::No APK file found"
        fi

    - name: Upload APK artifact
      if: steps.build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: apk_output/*.apk
        if-no-files-found: warn

    - name: Create Release
      if: steps.build.outcome == 'success' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: TVViewer v5.1 (Build ${{ github.run_number }})
        files: apk_output/*.apk
        fail_on_unmatched_files: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_output.log
        if-no-files-found: ignore
