name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix line endings
      run: sed -i 's/\r$//' gradlew

    - name: Build Debug APK
      id: build
      run: |
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log || true
        BUILD_EXIT=${PIPESTATUS[0]}
        echo "exit_code=$BUILD_EXIT" >> $GITHUB_OUTPUT
        if [ "$BUILD_EXIT" != "0" ]; then
          echo "Build failed with exit code $BUILD_EXIT"
        fi

    - name: Create issue on build failure
      if: steps.build.outputs.exit_code != '0'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ERROR_CONTENT=$(tail -100 build_output.log)
        gh issue create \
          --title "Build Error - $(date +%Y%m%d-%H%M)" \
          --body "## Build Error Log

        \`\`\`
        $ERROR_CONTENT
        \`\`\`

        Commit: ${{ github.sha }}
        Run: ${{ github.run_id }}"
        exit 1

    - name: Find and prepare APK
      if: steps.build.outputs.exit_code == '0'
      run: |
        find . -name "*.apk" -type f -ls
        APK_PATH=$(find . -name "*.apk" -path "*/outputs/*" -type f | head -1)
        if [ -z "$APK_PATH" ]; then
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
        fi
        if [ -n "$APK_PATH" ]; then
          mkdir -p apk_output
          cp "$APK_PATH" apk_output/TVViewer-v5.2-debug.apk
        else
          echo "::error::No APK found"
          exit 1
        fi

    - name: Upload APK artifact
      if: steps.build.outputs.exit_code == '0'
      uses: actions/upload-artifact@v4
      with:
        name: TVViewer-debug
        path: apk_output/TVViewer-v5.2-debug.apk
        if-no-files-found: error

    - name: Create Release
      if: steps.build.outputs.exit_code == '0' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v5.2-build${{ github.run_number }}
        name: TVViewer v5.2 (Build ${{ github.run_number }})
        files: apk_output/TVViewer-v5.2-debug.apk
        fail_on_unmatched_files: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
