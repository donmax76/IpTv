name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix line endings
      run: sed -i 's/\r$//' gradlew

    - name: Build Debug APK
      id: build
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace > build_output.log 2>&1
        BUILD_EXIT=$?
        echo "exit_code=$BUILD_EXIT" >> $GITHUB_OUTPUT
        cat build_output.log
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "::error::Gradle build failed with exit code $BUILD_EXIT"
          exit 1
        fi

    - name: Find and prepare APK
      id: apk
      run: |
        echo "=== All APK files ==="
        find . -name "*.apk" -type f -ls
        APK_PATH=$(find . -name "*.apk" -path "*/outputs/*" -type f | head -1)
        if [ -z "$APK_PATH" ]; then
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
        fi
        if [ -n "$APK_PATH" ]; then
          echo "APK found at: $APK_PATH"
          mkdir -p apk_output
          cp "$APK_PATH" apk_output/TVViewer-v5.1-debug.apk
          echo "apk_found=true" >> $GITHUB_OUTPUT
        else
          echo "::error::No APK file found!"
          echo "apk_found=false" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: TVViewer-debug
        path: apk_output/TVViewer-v5.1-debug.apk
        if-no-files-found: error

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v5.1-build${{ github.run_number }}
        name: TVViewer v5.1 (Build ${{ github.run_number }})
        files: apk_output/TVViewer-v5.1-debug.apk
        fail_on_unmatched_files: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
