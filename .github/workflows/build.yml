name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix line endings
      run: sed -i 's/\r$//' gradlew

    - name: Build Debug APK
      run: |
        # Try build with retry on failure
        for attempt in 1 2 3; do
          echo "=== Build attempt $attempt ==="
          if ./gradlew assembleDebug --stacktrace; then
            echo "Build succeeded on attempt $attempt"
            break
          else
            echo "Build failed on attempt $attempt"
            if [ $attempt -eq 3 ]; then
              echo "All attempts failed"
              exit 1
            fi
            echo "Retrying in 10 seconds..."
            sleep 10
            ./gradlew clean 2>/dev/null || true
          fi
        done

    - name: Find and prepare APK
      run: |
        echo "=== All APK files ==="
        find . -name "*.apk" -type f -ls
        APK_PATH=$(find . -name "*.apk" -path "*/outputs/*" -type f | head -1)
        if [ -z "$APK_PATH" ]; then
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
        fi
        if [ -n "$APK_PATH" ]; then
          echo "APK found at: $APK_PATH"
          mkdir -p apk_output
          cp "$APK_PATH" apk_output/TVViewer-v5.1-debug.apk
        else
          echo "::error::No APK file found!"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: TVViewer-debug
        path: apk_output/TVViewer-v5.1-debug.apk
        if-no-files-found: error

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v5.1-build${{ github.run_number }}
        name: TVViewer v5.1 (Build ${{ github.run_number }})
        files: apk_output/TVViewer-v5.1-debug.apk
        fail_on_unmatched_files: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
