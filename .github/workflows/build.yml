name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix line endings
      run: sed -i 's/\r$//' gradlew

    - name: Build Debug APK
      id: build
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace > build_output.log 2>&1 || true
        BUILD_EXIT=${PIPESTATUS[0]:-$?}
        echo "exit_code=$BUILD_EXIT" >> $GITHUB_OUTPUT
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "Build failed with exit code $BUILD_EXIT"
          echo "=== LAST 150 LINES ==="
          tail -150 build_output.log
          echo "=== ERROR LINES ==="
          grep -in "error" build_output.log | tail -30
        fi

    - name: Commit error log on failure
      if: steps.build.outputs.exit_code != '0'
      run: |
        tail -200 build_output.log > BUILD_ERROR.log
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add BUILD_ERROR.log
        git commit -m "CI: build error log [skip ci]" || true
        git push || true

    - name: Fail if build failed
      if: steps.build.outputs.exit_code != '0'
      run: exit 1

    - name: Find APK
      if: steps.build.outputs.exit_code == '0'
      run: |
        echo "=== All APK files ==="
        find . -name "*.apk" -type f -ls
        APK_PATH=$(find . -name "*.apk" -path "*/outputs/apk/*" -type f | head -1)
        if [ -n "$APK_PATH" ]; then
          mkdir -p apk_output
          cp "$APK_PATH" apk_output/
          echo "APK found: $APK_PATH"
        fi

    - name: Upload APK artifact
      if: steps.build.outputs.exit_code == '0'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: apk_output/*.apk
        if-no-files-found: warn

    - name: Create Release
      if: steps.build.outputs.exit_code == '0' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: TVViewer v5.1 (Build ${{ github.run_number }})
        files: apk_output/*.apk
        fail_on_unmatched_files: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
