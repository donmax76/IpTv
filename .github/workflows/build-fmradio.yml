name: Build FM Radio

on:
  push:
    branches: [ 'claude/fm-radio-app-*', 'main', 'master' ]
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build FM Radio APK
        run: |
          chmod +x gradlew
          ./gradlew :fmradio:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FmRadio-debug.apk
          path: fmradio/build/outputs/apk/debug/fmradio-debug.apk

  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyrtlsdr numpy scipy sounddevice pyinstaller

      - name: Build EXE
        working-directory: fmradio-windows
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "FmRadio" `
            --hidden-import "rtlsdr" `
            --hidden-import "numpy" `
            --hidden-import "scipy.signal" `
            --hidden-import "scipy.spatial" `
            --hidden-import "scipy.fft" `
            --hidden-import "scipy.linalg" `
            --hidden-import "scipy.special" `
            --hidden-import "sounddevice" `
            --hidden-import "_sounddevice_data" `
            --collect-data "sounddevice" `
            fm_radio.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: FmRadio-Windows
          path: fmradio-windows/dist/FmRadio.exe

  build-windows-portable:
    name: Build Windows Portable ZIP
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Python embeddable
        shell: pwsh
        run: |
          $pythonVersion = "3.10.11"
          $url = "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip

      - name: Create portable structure
        shell: pwsh
        run: |
          $out = "fmradio-portable"
          $pyDir = "$out/python"
          New-Item -ItemType Directory -Path $pyDir -Force
          Expand-Archive -Path python-embed.zip -DestinationPath $pyDir -Force

          # Enable site-packages in embeddable Python
          $pth = Get-ChildItem "$pyDir/python*._pth" | Select-Object -First 1
          @("python310.zip", ".", "Lib", "Lib/site-packages", "import site") | Set-Content $pth.FullName

          New-Item -ItemType Directory -Path "$pyDir/Lib/site-packages" -Force

      - name: Install pip and dependencies
        shell: pwsh
        run: |
          $pyDir = "fmradio-portable/python"
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$pyDir/get-pip.py"
          & "$pyDir/python.exe" "$pyDir/get-pip.py" --no-warn-script-location --quiet
          Remove-Item "$pyDir/get-pip.py"
          & "$pyDir/python.exe" -m pip install numpy scipy sounddevice pyrtlsdr `
            --target "$pyDir/Lib/site-packages" `
            --no-warn-script-location --quiet

      - name: Copy application files
        shell: pwsh
        run: |
          $out = "fmradio-portable"
          Copy-Item "fmradio-windows/fm_radio.py" "$out/fm_radio.py"
          if (Test-Path "fmradio-windows/fm_stations.json") {
            Copy-Item "fmradio-windows/fm_stations.json" "$out/fm_stations.json"
          }

          # Create launcher
          @"
          @echo off
          title FM Radio RTL-SDR - Portable
          color 0A
          echo.
          echo  ============================================
          echo   FM Radio RTL-SDR v1.0
          echo   Portable Edition (Python included)
          echo  ============================================
          echo  NOTE: Connect RTL-SDR device before starting!
          echo  If not detected, install WinUSB driver via Zadig:
          echo    https://zadig.akeo.ie
          "%~dp0python\python.exe" "%~dp0fm_radio.py"
          if %errorlevel% neq 0 (
              echo.
              echo  [ERROR] Application exited with error. See above.
              pause
          )
          "@ | Set-Content "$out/FmRadio.bat"

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "fmradio-portable" -DestinationPath "FmRadio-Windows-Portable.zip" -Force

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: FmRadio-Windows-Portable
          path: FmRadio-Windows-Portable.zip

  create-release:
    name: Create Release
    needs: [build-windows-portable, build-windows-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/FmRadio-Windows-Portable/FmRadio-Windows-Portable.zip release/
          cp artifacts/FmRadio-Windows/FmRadio.exe release/

      - name: Delete old release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        run: |
          gh release create latest \
            --title "FM Radio - Latest Build" \
            --notes "Автоматическая сборка FM Radio.

          **Скачать:**
          - **FmRadio-Windows-Portable.zip** — портативная версия (Python внутри, ничего не надо ставить)
          - **FmRadio.exe** — EXE версия (нужен Python на ПК)

          Распакуй ZIP и запусти **FmRadio.bat**" \
            --latest \
            release/FmRadio-Windows-Portable.zip \
            release/FmRadio.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
