<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПОТЕРЯННЫЙ РЕБЁНОК</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none;font-family:'Courier New',monospace}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui.active{pointer-events:auto}
.btn{background:#8b0000;color:#fff;border:2px solid #ff0000;padding:15px 40px;font-size:20px;font-family:'Courier New',monospace;cursor:pointer;pointer-events:auto;margin:10px;transition:all 0.3s}
.btn:hover{background:#ff0000;transform:scale(1.1)}
#prompt{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);color:#ff4444;font-size:22px;text-shadow:0 0 10px #ff0000;display:none;text-align:center;background:rgba(0,0,0,0.7);padding:10px 30px;border:1px solid #ff0000}
#hud{position:absolute;top:10px;left:10px;color:#aaa;font-size:14px;display:none}
#speechBubble{position:absolute;top:20%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;font-size:20px;padding:20px 30px;border:2px solid #ff4444;border-radius:10px;display:none;max-width:600px;text-align:center}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffffff55;font-size:24px;display:none}
#inventoryHud{position:absolute;top:10px;right:10px;color:#aaa;font-size:16px;display:none;background:rgba(0,0,0,0.5);padding:8px 15px;border:1px solid #555}
</style>

<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="prompt"></div>
  <div id="hud"></div>
  <div id="speechBubble"></div>
  <div id="crosshair">+</div>
  <div id="inventoryHud"></div>
</div>
<script>
'use strict';
const C=document.getElementById('gameCanvas');
const ctx=C.getContext('2d');
const uiDiv=document.getElementById('ui');
const promptEl=document.getElementById('prompt');
const hudEl=document.getElementById('hud');
const speechEl=document.getElementById('speechBubble');
const crosshairEl=document.getElementById('crosshair');
const inventoryEl=document.getElementById('inventoryHud');

let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

// Audio context
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}

// Sound functions
function playTone(freq,dur,type='sine',vol=0.3,detune=0){
  ensureAudio();
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;o.detune.value=detune;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}

function playNoise(dur,vol=0.2,filterFreq=1000,filterType='lowpass'){
  ensureAudio();
  const bufSize=audioCtx.sampleRate*dur;
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource();
  src.buffer=buf;
  const filt=audioCtx.createBiquadFilter();
  filt.type=filterType;filt.frequency.value=filterFreq;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
  src.start();
  return{src,gain:g,filter:filt};
}

function playAlarm(){
  ensureAudio();
  const now=audioCtx.currentTime;
  for(let i=0;i<8;i++){
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='square';
    o.frequency.value=i%2===0?800:600;
    g.gain.setValueAtTime(0.15,now+i*0.3);
    g.gain.exponentialRampToValueAtTime(0.001,now+i*0.3+0.25);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(now+i*0.3);o.stop(now+i*0.3+0.3);
  }
}

function playDoorCreak(){
  ensureAudio();
  const now=audioCtx.currentTime;
  const dur=1.5;
  const bufSize=audioCtx.sampleRate*dur;
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*0.5;
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.Q.value=15;
  bp.frequency.setValueAtTime(200,now);
  bp.frequency.exponentialRampToValueAtTime(800,now+0.5);
  bp.frequency.exponentialRampToValueAtTime(300,now+1.0);
  bp.frequency.exponentialRampToValueAtTime(600,now+1.5);
  const g=audioCtx.createGain();g.gain.setValueAtTime(0.25,now);
  g.gain.exponentialRampToValueAtTime(0.001,now+dur);
  src.connect(bp);bp.connect(g);g.connect(audioCtx.destination);
  src.start();
}

function playTick(){playTone(1200,0.03,'square',0.1)}
function playBell(){
  playTone(880,1.5,'sine',0.3);
  setTimeout(()=>playTone(880,1.0,'sine',0.2),200);
}

function playFootstep(){playNoise(0.08,0.05,800,'lowpass')}

let heartbeatInterval=null;
function startHeartbeat(bpm=70){
  stopHeartbeat();
  const ms=60000/bpm;
  heartbeatInterval=setInterval(()=>{
    playTone(40,0.15,'sine',0.4);
    setTimeout(()=>playTone(50,0.12,'sine',0.3),150);
  },ms);
}
function stopHeartbeat(){if(heartbeatInterval){clearInterval(heartbeatInterval);heartbeatInterval=null}}

function playScream(){
  ensureAudio();
  playNoise(1.5,0.6,3000,'highpass');
  playTone(200,1.5,'sawtooth',0.5);
  playTone(800,0.5,'square',0.4);
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(300,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(2000,audioCtx.currentTime+0.3);
  o.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+1.5);
  g.gain.setValueAtTime(0.5,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+1.5);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+1.5);
}

function playCrumble(){playNoise(0.5,0.3,400,'lowpass')}

let ambientOsc=null,ambientGain=null;
function startAmbient(){
  ensureAudio();
  if(ambientOsc)return;
  ambientOsc=audioCtx.createOscillator();
  ambientGain=audioCtx.createGain();
  const lfo=audioCtx.createOscillator();
  const lfoGain=audioCtx.createGain();
  ambientOsc.type='sine';ambientOsc.frequency.value=55;
  ambientGain.gain.value=0.08;
  lfo.type='sine';lfo.frequency.value=0.3;
  lfoGain.gain.value=20;
  lfo.connect(lfoGain);lfoGain.connect(ambientOsc.frequency);
  ambientOsc.connect(ambientGain);ambientGain.connect(audioCtx.destination);
  ambientOsc.start();lfo.start();
}
function stopAmbient(){
  if(ambientOsc){try{ambientOsc.stop()}catch(e){}ambientOsc=null}
}

// Input
const keys={};
let mouseX=0,mouseDX=0;
let mouseClicked=false;
let pointerLocked=false;

document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  keys['code_'+e.code]=true;
  if(e.key==='e'||e.key==='E'||e.code==='KeyE'){
    keys['interact']=true;
  }
});
document.addEventListener('keyup',e=>{
  keys[e.key.toLowerCase()]=false;
  keys['code_'+e.code]=false;
  if(e.key==='e'||e.key==='E'||e.code==='KeyE'){
    keys['interact']=false;
  }
});
document.addEventListener('mousemove',e=>{
  if(pointerLocked){
    mouseDX+=e.movementX;
  }
});
document.addEventListener('mousedown',e=>{
  if(e.button===0)mouseClicked=true;
});

C.addEventListener('click',()=>{
  if(!pointerLocked&&currentScene>0&&currentScene!==1){
    C.requestPointerLock();
  }
});
document.addEventListener('pointerlockchange',()=>{
  pointerLocked=!!document.pointerLockElement;
});

// Game state
let currentScene=0;
let sceneTime=0;
let fadeAlpha=0;
let fadeDir=0;
let fadeCallback=null;
let player={x:0,y:0,angle:0,speed:0.06};
let map=[];
let mapW=0,mapH=0;
let sprites=[];
let interactPressed=false;
let lastInteract=false;
let stoneCount=5;
let thrownStones=[];
let sceneData={};

// Wall textures (procedural)
function genTexture(w,h,fn){
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  const x=c.getContext('2d');
  fn(x,w,h);
  return c;
}

const TEX_BRICK=genTexture(64,64,(x,w,h)=>{
  x.fillStyle='#553322';x.fillRect(0,0,w,h);
  for(let r=0;r<4;r++){
    const off=r%2===0?0:16;
    for(let c=0;c<2;c++){
      x.fillStyle=`rgb(${100+Math.random()*50},${40+Math.random()*30},${20+Math.random()*20})`;
      x.fillRect(off+c*32+1,r*16+1,30,14);
      x.strokeStyle='#332211';x.strokeRect(off+c*32,r*16,32,16);
    }
  }
});

const TEX_WOOD=genTexture(64,64,(x,w,h)=>{
  x.fillStyle='#8B6914';x.fillRect(0,0,w,h);
  for(let i=0;i<h;i+=2){
    x.fillStyle=`rgba(0,0,0,${Math.random()*0.15})`;
    x.fillRect(0,i,w,1);
  }
  for(let c=0;c<4;c++){
    x.strokeStyle='#6B4914';x.beginPath();x.moveTo(c*16+8,0);x.lineTo(c*16+8,h);x.stroke();
  }
});

const TEX_STONE=genTexture(64,64,(x,w,h)=>{
  x.fillStyle='#666666';x.fillRect(0,0,w,h);
  for(let i=0;i<50;i++){
    x.fillStyle=`rgba(${Math.random()>0.5?255:0},${Math.random()>0.5?255:0},${Math.random()>0.5?255:0},${Math.random()*0.05})`;
    x.fillRect(Math.random()*w,Math.random()*h,3,3);
  }
  x.strokeStyle='#555';
  for(let r=0;r<4;r++){
    const off=r%2?0:16;
    for(let c=0;c<3;c++){
      x.strokeRect(off+c*24,r*16,24,16);
    }
  }
});

const TEX_DARK=genTexture(64,64,(x,w,h)=>{
  x.fillStyle='#222233';x.fillRect(0,0,w,h);
  for(let i=0;i<30;i++){
    x.fillStyle=`rgba(0,0,0,${Math.random()*0.3})`;
    x.fillRect(Math.random()*w,Math.random()*h,4,4);
  }
});

const TEX_DOOR=genTexture(64,64,(x,w,h)=>{
  x.fillStyle='#5a3a1a';x.fillRect(0,0,w,h);
  x.strokeStyle='#3a2a0a';x.lineWidth=2;
  x.strokeRect(4,4,w-8,h-8);
  x.strokeRect(8,8,w-16,h/2-12);
  x.strokeRect(8,h/2+4,w-16,h/2-12);
  x.fillStyle='#aa8833';
  x.beginPath();x.arc(w-14,h/2,3,0,Math.PI*2);x.fill();
});

const TEX_BLACKBOARD=genTexture(64,64,(x,w,h)=>{
  x.fillStyle='#1a3a1a';x.fillRect(0,0,w,h);
  x.strokeStyle='#8B6914';x.lineWidth=3;x.strokeRect(2,2,w-4,h-4);
  x.fillStyle='rgba(255,255,255,0.3)';x.font='10px serif';
  x.fillText('A=B+C',8,25);x.fillText('x=42',8,45);
});

const TEX_WINDOW=genTexture(64,64,(x,w,h)=>{
  x.fillStyle='#334466';x.fillRect(0,0,w,h);
  x.fillStyle='#88aacc';x.fillRect(4,4,w-8,h-8);
  x.strokeStyle='#666';x.lineWidth=2;
  x.beginPath();x.moveTo(w/2,4);x.lineTo(w/2,h-4);x.stroke();
  x.beginPath();x.moveTo(4,h/2);x.lineTo(w-4,h/2);x.stroke();
});

const TEX_PINK=genTexture(64,64,(x,w,h)=>{
  x.fillStyle='#cc6688';x.fillRect(0,0,w,h);
  for(let i=0;i<8;i++){
    x.fillStyle=`rgba(255,200,200,${Math.random()*0.2})`;
    x.fillRect(0,i*8,w,4);
  }
});

const textures=[null,TEX_BRICK,TEX_WOOD,TEX_STONE,TEX_DARK,TEX_DOOR,TEX_BLACKBOARD,TEX_WINDOW,TEX_PINK];

// Raycaster
const FOV=Math.PI/3;
const RAYS_PER_PX=1;
const MAX_DEPTH=20;

function castRay(px,py,angle){
  const sin=Math.sin(angle),cos=Math.cos(angle);
  let dist=0;
  const step=0.02;
  while(dist<MAX_DEPTH){
    dist+=step;
    const cx=px+cos*dist;
    const cy=py+sin*dist;
    const mx=Math.floor(cx),my=Math.floor(cy);
    if(mx<0||my<0||mx>=mapW||my>=mapH)return{dist:MAX_DEPTH,wall:1,texX:0,side:0};
    const cell=map[my*mapW+mx];
    if(cell>0){
      // determine side and texX
      const prevX=px+cos*(dist-step),prevY=py+sin*(dist-step);
      const pmx=Math.floor(prevX),pmy=Math.floor(prevY);
      let side=0,texX=0;
      if(pmx!==mx){side=0;texX=cy-Math.floor(cy)}
      else{side=1;texX=cx-Math.floor(cx)}
      return{dist,wall:cell,texX,side};
    }
  }
  return{dist:MAX_DEPTH,wall:0,texX:0,side:0};
}

function renderScene(){
  const stripW=Math.max(1,Math.ceil(W/320));
  const numRays=Math.ceil(W/stripW);
  const halfH=H/2;
  
  // ceiling
  ctx.fillStyle=sceneData.ceilColor||'#111111';
  ctx.fillRect(0,0,W,halfH);
  // floor
  ctx.fillStyle=sceneData.floorColor||'#333322';
  ctx.fillRect(0,halfH,W,halfH);
  
  const zbuf=new Float32Array(numRays);
  
  for(let i=0;i<numRays;i++){
    const rayAngle=player.angle-FOV/2+FOV*(i/numRays);
    const hit=castRay(player.x,player.y,rayAngle);
    const perpDist=hit.dist*Math.cos(rayAngle-player.angle);
    zbuf[i]=perpDist;
    
    if(hit.wall>0&&perpDist>0.1){
      const wallH=H/perpDist;
      const drawY=halfH-wallH/2;
      
      const tex=textures[hit.wall]||TEX_BRICK;
      if(tex){
        const texX=Math.floor(hit.texX*tex.width)%tex.width;
        const shade=hit.side?0.7:1.0;
        const fogFactor=Math.max(0,1-perpDist/MAX_DEPTH);
        
        ctx.save();
        ctx.globalAlpha=fogFactor;
        try{
          ctx.drawImage(tex,texX,0,1,tex.height,i*stripW,drawY,stripW+1,wallH);
        }catch(e){}
        if(shade<1||fogFactor<1){
          ctx.globalAlpha=1;
          ctx.fillStyle=`rgba(0,0,0,${(1-shade*fogFactor)*0.5})`;
          ctx.fillRect(i*stripW,drawY,stripW+1,wallH);
        }
        ctx.restore();
      }
    }
  }
  
  // Render sprites
  if(sprites.length>0){
    const sortedSprites=[...sprites].filter(s=>s.active!==false);
    sortedSprites.forEach(s=>{
      const dx=s.x-player.x,dy=s.y-player.y;
      s._dist=Math.sqrt(dx*dx+dy*dy);
    });
    sortedSprites.sort((a,b)=>b._dist-a._dist);
    
    for(const sp of sortedSprites){
      const dx=sp.x-player.x,dy=sp.y-player.y;
      const dist=sp._dist;
      if(dist<0.3||dist>MAX_DEPTH)continue;
      
      let sprAngle=Math.atan2(dy,dx)-player.angle;
      while(sprAngle>Math.PI)sprAngle-=Math.PI*2;
      while(sprAngle<-Math.PI)sprAngle+=Math.PI*2;
      
      if(Math.abs(sprAngle)>FOV/2+0.3)continue;
      
      const screenX=W/2+Math.tan(sprAngle)*(W/2)/Math.tan(FOV/2);
      const sprH=(sp.height||1)*H/dist;
      const sprW=(sp.width||0.5)*H/dist;
      const drawX=screenX-sprW/2;
      const drawY=H/2-sprH/2+(sp.yOffset||0)*H/dist;
      
      const fogFactor=Math.max(0,1-dist/MAX_DEPTH);
      ctx.save();
      ctx.globalAlpha=fogFactor;
      
      // Check zbuffer for occlusion
      const startCol=Math.max(0,Math.floor(drawX/stripW));
      const endCol=Math.min(numRays-1,Math.floor((drawX+sprW)/stripW));
      let visible=false;
      for(let c=startCol;c<=endCol;c++){
        if(zbuf[c]>dist){visible=true;break}
      }
      
      if(visible){
        if(sp.draw){
          sp.draw(ctx,drawX,drawY,sprW,sprH,dist);
        }else{
          ctx.fillStyle=sp.color||'#ff0000';
          ctx.fillRect(drawX,drawY,sprW,sprH);
        }
      }
      ctx.restore();
    }
  }
}

// Movement
let footstepTimer=0;
function movePlayer(dt){
  const moveSpeed=player.speed*(keys['shift']?1.8:1);
  let dx=0,dy=0;
  const cos=Math.cos(player.angle),sin=Math.sin(player.angle);
  
  if(keys['w']||keys['arrowup']){dx+=cos*moveSpeed;dy+=sin*moveSpeed}
  if(keys['s']||keys['arrowdown']){dx-=cos*moveSpeed;dy-=sin*moveSpeed}
  if(keys['a']||keys['arrowleft']){dx+=sin*moveSpeed;dy-=cos*moveSpeed}
  if(keys['d']||keys['arrowright']){dx-=sin*moveSpeed;dy+=cos*moveSpeed}
  
  // Mouse look
  player.angle+=mouseDX*0.002;
  mouseDX=0;
  
  if(dx!==0||dy!==0){
    const nx=player.x+dx;
    const ny=player.y+dy;
    const margin=0.2;
    
    // Collision detection
    const canMoveX=map[Math.floor(player.y)*mapW+Math.floor(nx+margin*Math.sign(dx))]===0;
    const canMoveY=map[Math.floor(ny+margin*Math.sign(dy))*mapW+Math.floor(player.x)]===0;
    
    if(canMoveX)player.x=nx;
    if(canMoveY)player.y=ny;
    
    footstepTimer+=dt;
    if(footstepTimer>300){footstepTimer=0;playFootstep()}
  }
}

// Fade system
function startFade(dir,cb){
  fadeDir=dir;fadeAlpha=dir>0?0:1;fadeCallback=cb;
}

function updateFade(dt){
  if(fadeDir!==0){
    fadeAlpha+=fadeDir*dt/800;
    if(fadeDir>0&&fadeAlpha>=1){fadeAlpha=1;fadeDir=0;if(fadeCallback)fadeCallback()}
    if(fadeDir<0&&fadeAlpha<=0){fadeAlpha=0;fadeDir=0;if(fadeCallback)fadeCallback()}
  }
}

function drawFade(){
  if(fadeAlpha>0){
    ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;
    ctx.fillRect(0,0,W,H);
  }
}

// UI helpers
function showPrompt(text){promptEl.style.display='block';promptEl.textContent=text}
function hidePrompt(){promptEl.style.display='none'}
function showSpeech(text){speechEl.style.display='block';speechEl.textContent=text}
function hideSpeech(){speechEl.style.display='none'}

function checkInteract(){
  const pressed=keys['interact']||keys['e']||keys['code_KeyE'];
  const justPressed=pressed&&!lastInteract;
  lastInteract=pressed;
  return justPressed;
}

// ========================

// Scene 0: Title
function initScene0(){
  currentScene=0;
  hidePrompt();hideSpeech();
  crosshairEl.style.display='none';
  inventoryEl.style.display='none';
  document.exitPointerLock&&document.exitPointerLock();
}

function updateScene0(dt){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  
  // Blood drip effect
  const t=Date.now()/1000;
  for(let i=0;i<20;i++){
    const x=((i*137+50)%W);
    const drip=(t*30+i*100)%H;
    ctx.fillStyle='rgba(139,0,0,0.3)';
    ctx.fillRect(x,0,2,drip);
  }
  
  // Title
  ctx.save();
  ctx.textAlign='center';
  const glow=Math.sin(t*2)*0.3+0.7;
  ctx.shadowColor='#ff0000';ctx.shadowBlur=30*glow;
  ctx.fillStyle=`rgba(180,0,0,${glow})`;
  ctx.font='bold 60px Courier New';
  ctx.fillText('ПОТЕРЯННЫЙ',W/2,H/3-20);
  ctx.fillText('РЕБЁНОК',W/2,H/3+50);
  ctx.shadowBlur=0;
  
  ctx.font='16px Courier New';
  ctx.fillStyle='#888';
  ctx.fillText('WASD - движение | Мышь - обзор | E - взаимодействие',W/2,H-80);
  ctx.restore();
  
  // Start button
  const btnX=W/2-80,btnY=H/2+40,btnW=160,btnH=50;
  const hover=mouseInRect(btnX,btnY,btnW,btnH);
  ctx.fillStyle=hover?'#cc0000':'#880000';
  ctx.fillRect(btnX,btnY,btnW,btnH);
  ctx.strokeStyle='#ff0000';ctx.strokeRect(btnX,btnY,btnW,btnH);
  ctx.fillStyle='#fff';ctx.font='22px Courier New';ctx.textAlign='center';
  ctx.fillText('Начать',W/2,btnY+33);
}

let mouseScreenX=W/2,mouseScreenY=H/2;
document.addEventListener('mousemove',e=>{
  if(!pointerLocked){mouseScreenX=e.clientX;mouseScreenY=e.clientY}
});

function mouseInRect(x,y,w,h){
  return mouseScreenX>=x&&mouseScreenX<=x+w&&mouseScreenY>=y&&mouseScreenY<=y+h;
}

document.addEventListener('click',e=>{
  if(currentScene===0){
    const btnX=W/2-80,btnY=H/2+40,btnW=160,btnH=50;

function updateScene4(dt){
  movePlayer(dt);
  sceneData.classTime+=dt;
  
  renderScene();
  
  if(sceneData.clockPhase){
    sceneData.clockTime+=dt*sceneData.clockSpeed;
    sceneData.clockSpeed=1+sceneData.clockTime/3000;
    
    sceneData.tickTimer+=dt*sceneData.clockSpeed;
    if(sceneData.tickTimer>300){sceneData.tickTimer=0;playTick()}
    
    // Draw clock overlay
    const cx=W/2,cy=80,cr=60;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(cx-cr-10,cy-cr-10,cr*2+20,cr*2+20);
    ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);
    ctx.fillStyle='#ddd';ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=3;ctx.stroke();
    
    // Numbers
    ctx.fillStyle='#333';ctx.font='12px Courier New';ctx.textAlign='center';
    for(let i=1;i<=12;i++){
      const a=-Math.PI/2+i*Math.PI/6;
      ctx.fillText(i.toString(),cx+Math.cos(a)*(cr-15),cy+Math.sin(a)*(cr-15)+4);
    }
    
    // Hands
    const hours=(sceneData.clockTime/2000)%12;
    const minutes=(sceneData.clockTime/200)%60;
    
    // Hour hand
    const ha=-Math.PI/2+hours*Math.PI/6;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(ha)*30,cy+Math.sin(ha)*30);
    ctx.strokeStyle='#333';ctx.lineWidth=3;ctx.stroke();
    
    // Minute hand
    const ma=-Math.PI/2+minutes*Math.PI/30;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(ma)*45,cy+Math.sin(ma)*45);
    ctx.strokeStyle='#555';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
    
    // After ~6 hours simulated
    if(sceneData.clockTime>12000&&!sceneData.bellPlayed){
      sceneData.bellPlayed=true;
      sceneData.clockPhase=false;
      playBell();
      setTimeout(()=>{
        sceneData.canLeave=true;
        showPrompt('Нажмите E чтобы покинуть класс');
      },1500);
    }
  }
  
  if(sceneData.canLeave&&checkInteract()){
    hidePrompt();
    startFade(1,()=>{initScene5();startFade(-1,null)});
  }
}

function updateScene5(dt){
  movePlayer(dt);
  sceneData.timer+=dt;
  
  sceneData.ceilColor='#0a0a1a';
  sceneData.floorColor='#1a1a0a';
  
  // Move NPCs randomly
  for(let i=0;i<6;i++){
    const npc=sprites[i];
    if(!npc.active)continue;
    npc.changeTimer+=dt;
    if(npc.changeTimer>2000){
      npc.changeTimer=0;
      npc.vx=(Math.random()-0.5)*0.02;
      npc.vy=(Math.random()-0.5)*0.02;
    }
    npc.x+=npc.vx;npc.y+=npc.vy;
    if(npc.x<2)npc.x=2;if(npc.x>mapW-2)npc.x=mapW-2;
    if(npc.y<2)npc.y=2;if(npc.y>mapH-2)npc.y=mapH-2;
  }
  
  // Woman behavior
  const woman=sprites[6];
  if(woman&&woman.active&&!sceneData.showJumpscare&&!sceneData.showChoices){
    if(woman.approachPhase<3){
      // Approach NPC one by one
      const targetNPC=sprites[woman.targetNPC];
      if(targetNPC){
        const dx=targetNPC.x-woman.x,dy=targetNPC.y-woman.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d>1){
          woman.x+=dx/d*0.03;woman.y+=dy/d*0.03;
        }else{
          woman.pauseTimer+=dt;
          if(woman.pauseTimer>1500){
            woman.pauseTimer=0;
            woman.targetNPC++;
            woman.approachPhase++;
          }
        }
      }
    }else{
      // Run towards player
      const dx=player.x-woman.x,dy=player.y-woman.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>1.5){
        const speed=0.05;
        woman.x+=dx/d*speed;woman.y+=dy/d*speed;
        if(!sceneData.speechShown&&d<6){
          sceneData.speechShown=true;
          showSpeech('Помогите! Мой ребёнок пропал! Пожалуйста, помогите мне найти его!');

    // Dark hair

    ctx.beginPath();ctx.ellipse(fx,fy-H*0.25,W*0.28,H*0.2,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(fx-W*0.28,fy-H*0.2,W*0.08,H*0.5);
    ctx.fillRect(fx+W*0.2,fy-H*0.2,W*0.08,H*0.5);
    
    // Black hollow eyes
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(fx-W*0.08,fy-H*0.05,W*0.06,H*0.08,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(fx+W*0.08,fy-H*0.05,W*0.06,H*0.08,0,0,Math.PI*2);ctx.fill();
    
    // Red in eyes
    ctx.fillStyle='#ff0000';
    ctx.beginPath();ctx.arc(fx-W*0.08,fy-H*0.05,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(fx+W*0.08,fy-H*0.05,5,0,Math.PI*2);ctx.fill();
    
    // Wide grinning mouth with teeth
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.moveTo(fx-W*0.12,fy+H*0.12);

function throwStone(){
  if(stoneCount<=0)return;
  stoneCount--;
  playTone(300,0.1,'triangle',0.1);
  // Stone lands ahead of player
  const dist=3;
  const tx=player.x+Math.cos(player.angle)*dist;
  const ty=player.y+Math.sin(player.angle)*dist;
  
  // Check if it hits a trap tile
  for(let i=0;i<sceneData.traps.length;i++){
    const t=sceneData.traps[i];
    if(Math.abs(t.x+0.5-tx)<0.8&&Math.abs(t.y+0.5-ty)<0.8){
      sceneData.revealed[i]=true;
      if(t.isTrap){
        t.crumbled=true;
        playCrumble();
        // Make it a wall (pit)
        map[t.y*mapW+t.x]=0;// stays 0 but visually marked
      }else{
        playTone(500,0.1,'sine',0.1);
      }
      break;
    }
  }
}

function updateScene6A(dt){
  movePlayer(dt);
  
  sceneData.ceilColor='#0a0a0a';
  sceneData.floorColor='#2a1515';
  
  renderScene();
  
  // Draw floor tiles overlay (on the ground plane)
  // Simple colored indicators near bottom of screen
  
  // HUD
  inventoryEl.textContent=`Камни: ${stoneCount}`;
  
  // Draw trap indicators on floor
  for(let i=0;i<sceneData.traps.length;i++){
    const t=sceneData.traps[i];
    if(t.crumbled){
      // Draw crumbled tile indicator in 3D
    }
  }
  
  // Woman AI
  const woman=sprites[0];
  if(woman&&woman.active&&sceneData.phase==='puzzle'){
    sceneData.womanMoveTimer+=dt;
    if(sceneData.womanMoveTimer>3000&&!sceneData.womanFallen){
      // Woman walks forward recklessly
      woman.y+=0.01;
      
      // Check if woman steps on trap
      for(const t of sceneData.traps){
        if(t.isTrap&&!t.crumbled&&Math.abs(t.x+0.5-woman.x)<0.5&&Math.abs(t.y+0.5-woman.y)<0.5){
          sceneData.womanFallen=true;
          woman.active=false;
          playScream();
          showSpeech('Она упала в ловушку!');
          setTimeout(()=>hideSpeech(),3000);
          break;
        }
      }
    }
    
    // Check if player reaches end
    if(player.y>mapH-3&&!sceneData.doorOpened){
      sceneData.doorOpened=true;
      map[(mapH-1)*mapW+2]=0;
      showPrompt('Нажмите E чтобы открыть дверь');
    }
    
    if(sceneData.doorOpened&&checkInteract()&&!sceneData.childFound){
      sceneData.childFound=true;
      sceneData.phase='child';
      hidePrompt();
      // Child sprite
      sprites.push({
        x:2.5,y:mapH-0.5,color:'#aaaaff',width:0.3,height:0.5,active:true,
        draw:(c,x,y,w,h)=>{
          c.fillStyle='#aaaaff';c.fillRect(x,y+h*0.3,w,h*0.7);
          c.fillStyle='#ffddbb';c.fillRect(x+w*0.2,y,w*0.6,h*0.3);
        }
      });
      showSpeech('Вы нашли ребёнка!');
      setTimeout(()=>{
        hideSpeech();
        sceneData.oldManScare=true;
        sceneData.oldManTimer=0;
      },2000);
    }
  }
  
  // Old man jumpscare
  if(sceneData.oldManScare&&!sceneData.chasePhase){
    sceneData.oldManTimer+=dt;
    if(sceneData.oldManTimer<2000){
      ctx.save();
      ctx.translate(Math.random()*15-7,Math.random()*10-5);
      ctx.fillStyle='#220000';ctx.fillRect(0,0,W,H);
      
      const fx=W/2,fy=H/2;
      // Grey skin
      ctx.fillStyle='#888877';
      ctx.beginPath();ctx.ellipse(fx,fy,W*0.2,H*0.35,0,0,Math.PI*2);ctx.fill();
      // Bald
      ctx.fillStyle='#777766';
      ctx.beginPath();ctx.ellipse(fx,fy-H*0.2,W*0.18,H*0.15,0,Math.PI,Math.PI*2);ctx.fill();
      // White blind eyes
      ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.ellipse(fx-W*0.06,fy-H*0.05,W*0.04,H*0.06,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(fx+W*0.06,fy-H*0.05,W*0.04,H*0.06,0,0,Math.PI*2);ctx.fill();
      // Sharp teeth mouth
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctx.moveTo(fx-W*0.1,fy+H*0.1);
      ctx.lineTo(fx,fy+H*0.2);
      ctx.lineTo(fx+W*0.1,fy+H*0.1);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';
      for(let i=0;i<6;i++){
        const tx=fx-W*0.08+i*W*0.03;
        ctx.beginPath();ctx.moveTo(tx,fy+H*0.1);ctx.lineTo(tx+W*0.015,fy+H*0.15);ctx.lineTo(tx+W*0.03,fy+H*0.1);ctx.fill();
      }
      
      ctx.restore();
      playScream();
    }else{
      sceneData.oldManScare=false;
      sceneData.chasePhase=true;
      sceneData.chaseTimer=0;
      player.angle=-Math.PI/2;// face back
      showPrompt('БЕГИТЕ! (WASD)');
      startHeartbeat(140);
      
      // Old man chaser sprite
      sprites.push({
        x:2.5,y:mapH-1,color:'#555',width:0.6,height:1,active:true,isChaser:true,
        draw:(c,x,y,w,h)=>{
          c.fillStyle='#555544';c.fillRect(x,y+h*0.2,w,h*0.8);
          c.fillStyle='#888877';c.fillRect(x+w*0.15,y,w*0.7,h*0.3);
          c.fillStyle='#fff';
          c.beginPath();c.arc(x+w*0.35,y+h*0.1,w*0.08,0,Math.PI*2);c.fill();
          c.beginPath();c.arc(x+w*0.65,y+h*0.1,w*0.08,0,Math.PI*2);c.fill();
        }
      });
    }
  }
  
  // Chase sequence
  if(sceneData.chasePhase){
    sceneData.chaseTimer+=dt;
    const chaser=sprites.find(s=>s.isChaser);
    if(chaser){
      const dx=player.x-chaser.x,dy=player.y-chaser.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      const speed=0.035+sceneData.chaseTimer/100000;
      if(d>0.1){
        chaser.x+=dx/d*speed;
        chaser.y+=dy/d*speed;
      }
      if(d<0.8){
        // Caught!
        sceneData.caught=true;
        sceneData.chasePhase=false;
        stopHeartbeat();
        hidePrompt();
        initEnding('gameover');
        return;
      }
    }
    
    // Check if player reaches start
    if(player.y<2.5){
      sceneData.chasePhase=false;
      stopHeartbeat();
      hidePrompt();
      initEnding('good');
    }
  }
  
  // Dark overlay
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,0,W,H);
}

// Scene 6B: Decline path
function initScene6B(){
  currentScene=7;
  sceneData={phase:'walk',timer:0,atHome:false,newsTimer:0};
  mapW=10;mapH=20;
  map=[];
  for(let y=0;y<mapH;y++){
    for(let x=0;x<mapW;x++){
      if(x===0||x===mapW-1||y===0)map.push(4);
      else if(y===mapH-1)map.push(5);
      else map.push(0);
    }
  }
  player.x=5;player.y=mapH-3;player.angle=-Math.PI/2;
  sprites=[];
  crosshairEl.style.display='block';
  inventoryEl.style.display='none';
  hidePrompt();hideSpeech();
  showSpeech('Женщина кричит и убегает прочь...');
  setTimeout(()=>{hideSpeech();showPrompt('Идите домой (вперёд)')},3000);
  stopHeartbeat();
}

function updateScene6B(dt){
  movePlayer(dt);
  sceneData.timer+=dt;
  
  sceneData.ceilColor='#050510';
  sceneData.floorColor='#151510';
  
  renderScene();
  ctx.fillStyle='rgba(0,0,20,0.4)';ctx.fillRect(0,0,W,H);
  
  if(player.y<3&&!sceneData.atHome){
    sceneData.atHome=true;
    hidePrompt();
    showSpeech('Вы пришли домой. Включаете телевизор...');
    sceneData.newsTimer=0;
  }
  
  if(sceneData.atHome){
    sceneData.newsTimer+=dt;
    if(sceneData.newsTimer>3000){
      hideSpeech();
      // Show news
      ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#00ff00';ctx.font='20px Courier New';ctx.textAlign='center';
      ctx.fillText('ЭКСТРЕННЫЕ НОВОСТИ',W/2,H/3);
      ctx.fillStyle='#ff4444';
      ctx.fillText('Женщина найдена мёртвой',W/2,H/3+40);
      ctx.fillText('Ребёнок пропал навсегда',W/2,H/3+70);
    }
    if(sceneData.newsTimer>6000){
      initEnding('bad');
    }
  }
}

// Endings
function initEnding(type){
  stopHeartbeat();stopAmbient();
  crosshairEl.style.display='none';
  inventoryEl.style.display='none';
  hidePrompt();hideSpeech();
  document.exitPointerLock&&document.exitPointerLock();
  
  if(type==='good'){currentScene=70;sceneData={msg:'ВЫ СПАСЛИ РЕБЁНКА',color:'#00ff00'}}
  else if(type==='bad'){currentScene=71;sceneData={msg:'КОНЕЦ. Она погибла...',color:'#ff0000'}}
  else{currentScene=72;sceneData={msg:'ВАС ПОЙМАЛИ. ИГРА ОКОНЧЕНА.',color:'#ff0000'}}
}

function updateEnding(dt){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  
  const t=Date.now()/1000;
  ctx.save();
  ctx.textAlign='center';
  ctx.shadowColor=sceneData.color;ctx.shadowBlur=20+Math.sin(t*2)*10;
  ctx.fillStyle=sceneData.color;
  ctx.font='bold 40px Courier New';
  ctx.fillText(sceneData.msg,W/2,H/3);
  ctx.shadowBlur=0;
  
  // Restart button
  const bx=W/2-100,by=H/2+80,bw=200,bh=50;
  const hover=mouseInRect(bx,by,bw,bh);
  ctx.fillStyle=hover?'#880000':'#440000';
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='#ff0000';ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff';ctx.font='20px Courier New';
  ctx.fillText('Начать заново',W/2,by+32);
  ctx.restore();
}

// Main loop
let lastTime=0;
function gameLoop(time){
  const dt=Math.min(time-lastTime,50);
  lastTime=time;
  
  ctx.clearRect(0,0,W,H);
  
  switch(currentScene){
    case 0:updateScene0(dt);break;
    case 2:updateScene2(dt);break;
    case 3:updateScene3(dt);break;
    case 4:updateScene4(dt);break;
    case 5:updateScene5(dt);break;
    case 6:updateScene6A(dt);break;
    case 7:updateScene6B(dt);break;
    case 70:case 71:case 72:updateEnding(dt);break;
  }
  
  updateFade(dt);
  drawFade();
  
  requestAnimationFrame(gameLoop);
}

initScene0();
requestAnimationFrame(gameLoop);
</script>
